<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reservas de Importaciones - Interagrovial</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --jd-green:#184f13;
      --jd-green-dark:#0f3a0f;
      --jd-yellow:#ffde00;
      --bg:#f6faf6;
      --surface:#ffffff;
      --surface-2:#fbfffb;
      --text:#071217;
      --muted:#5f6b67;
      --row-text:#274939;
      --border:#e7efe7;
      --border-strong:#d6e5d6;
      --shadow:0 18px 48px rgba(10,16,12,.10);
      --shadow2:0 10px 22px rgba(10,16,12,.08);
      --radius:16px;
      --accent-gradient: linear-gradient(90deg, var(--jd-green), var(--jd-green-dark));
    }

    *{box-sizing:border-box}
    html { scrollbar-gutter: stable; }
    body{
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      margin:0;
      padding:18px 18px 90px;
      background:
        radial-gradient(1200px 600px at 15% 0%, rgba(46,125,50,.06), transparent 55%),
        radial-gradient(1200px 600px at 85% 0%, rgba(255,222,0,.03), transparent 55%),
        var(--bg);
      color: var(--text);
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    }

    .topbar{
      position: sticky;
      top: 0;
      z-index: 50;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      margin: 0 0 18px 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(180deg, #0f1b12 0%, #101f14 100%);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 18px 50px rgba(0,0,0,.22);
      backdrop-filter: blur(8px);
    }

    .companyName{
      font-size:13px;
      font-weight:900;
      letter-spacing:.06em;
      color:rgba(255,255,255,.60);
      text-transform:uppercase;
    }

    .title{
      margin: 0 auto;
      background: transparent;
      box-shadow: none;
      border: none;
      padding: 0;
      font-size: 34px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: .03em;
      text-transform: none;
      display:flex;
      align-items:center;
      gap:14px;
    }

    .titleIcon{
      width: 52px;
      height: 52px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,222,0,.18), rgba(255,255,255,.08));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 8px 20px rgba(0,0,0,.16);
      flex: 0 0 auto;
    }
    .titleIcon svg{ width: 28px; height: 28px; display:block; }

    .titleText{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      line-height:1;
    }

    .titleText small{
      margin-top: 6px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(255,255,255,.64);
    }

    .subpill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid rgba(255,255,255,.12);
      padding:8px 12px;
      border-radius:999px;
      background: rgba(255,255,255,.06);
      font-size:12px;
      color: rgba(255,255,255,.85);
      box-shadow: none;
    }

    .subpill b{color: var(--jd-yellow)}

    @media (max-width: 720px){
      .topbar{padding:12px 12px}
      .title{font-size:28px}
    }

    .card{
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      overflow:hidden;
      position:relative;
      padding-left: 20px;
    }

    .accentBar{
      position:absolute;
      left:0;
      top:0;
      height:100%;
      width:10px;
      background: var(--accent-gradient);
      border-top-left-radius:var(--radius);
      border-bottom-left-radius:var(--radius);
      box-shadow: 0 10px 22px rgba(24,79,19,.10);
      display:block;
    }

    .cardHeader{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:10px;
      margin-bottom:12px;
      position:relative;
      min-height:56px;
      padding-right:12px;
      border-bottom:1px solid var(--border);
      padding-bottom:14px;
      margin-bottom:18px;
    }

    .cardHeader .row{ margin-left:auto; display:flex; gap:8px; align-items:center }

    .cardHeader h3{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      font-size:12px;
      padding:10px 18px;
      border-radius:14px;
      background: linear-gradient(90deg, rgba(255,222,0,.12), rgba(46,125,50,.06));
      color: var(--jd-green-dark);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.12em;
      border:1px solid rgba(46,125,50,.12);
      box-shadow: 0 10px 22px rgba(24,79,19,.08);
      z-index:2;
      white-space:nowrap;
    }

    .card > h3{
      margin:6px auto 12px;
      font-size:12px;
      padding:10px 18px;
      border-radius:14px;
      background: linear-gradient(90deg, rgba(255,222,0,.10), rgba(255,222,0,.04));
      color: var(--jd-green-dark);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.10em;
      border:1px solid rgba(46,125,50,.10);
      box-shadow: 0 10px 22px rgba(24,79,19,.08);
      text-align:center;
      display:block;
    }

    @media (max-width:720px){
      .cardHeader h3{position:static;transform:none;margin:0 auto 10px}
      .card > h3{margin:6px 12px 12px}
    }

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
    .row-add{display:flex;gap:10px;flex-wrap:wrap;align-items:end}

    label{
      font-size:12px;
      color:var(--muted);
      display:block;
      margin-bottom:8px;
      font-weight:800;
      text-align:center;
    }

    .card .row > div,
    .card .row-add > div{
      display:flex;
      flex-direction:column;
      align-items:center;
      min-width:0;
    }

    input,select{
      padding:10px 12px;
      border:1px solid var(--border-strong);
      border-radius:14px;
      font-size:14px;
      font-family: inherit;
      min-width:160px;
      background: rgba(10,16,12,.03);
      color: var(--text);
      outline:none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.65);
      height: auto;
      line-height: 1.4;
    }

    input::placeholder{color:var(--muted)}

    input:focus,select:focus{
      border-color: rgba(24,79,19,.9);
      box-shadow: 0 0 0 6px rgba(24,79,19,.14);
    }

    button{
      padding:10px 12px;
      border:1px solid var(--border-strong);
      background: rgba(10,16,12,.03);
      border-radius:14px;
      cursor:pointer;
      transition:.12s ease;
      font-weight:900;
      color: var(--text);
      box-shadow: var(--shadow2);
      font-family: inherit;
    }

    button:hover{transform: translateY(-1px)}

    button.primary{
      background: linear-gradient(135deg, var(--jd-green), var(--jd-green-dark));
      border-color: rgba(15,64,18,.95);
      color:#fff;
      box-shadow: 0 16px 34px rgba(24,79,19,.22);
    }

    button.secondary{
      background: linear-gradient(135deg, var(--jd-yellow), #ffd600);
      border-color: rgba(255,222,0,.55);
      color: #0b1a10;
      box-shadow: 0 10px 20px rgba(255,222,0,.12);
    }

    button.danger{
      color:#ffd7dc;
      border-color:#5a2731;
      background: rgba(176,0,32,.16);
    }

    button.small{
      padding:6px 10px;
      border-radius:10px;
      font-size:11px;
      box-shadow:none;
      font-weight:800;
      min-width:auto;
      max-width:none;
      white-space:nowrap;
    }

    .muted{color:var(--muted);font-size:12px;margin-top:8px}
    .toast{margin-top:10px;font-size:13px;color:#2f7e2c;display:none;font-weight:900}
    .toast.err{color:#b00020}

    table{
      width:100%;
      min-width:1500px;
      border-collapse:separate;
      border-spacing:4px 12px;
      background: transparent;
      border:1px solid var(--border-strong);
      border-radius: var(--radius);
      overflow:visible;
      box-shadow: var(--shadow);
    }

    thead th{
      background: linear-gradient(180deg, #184f13, #0f3a0f);
      position:static;
      text-align:center;
      color: rgba(255,255,255,.92);
      border-bottom: 1px solid rgba(255,255,255,.14);
      box-shadow: inset 0 -1px 0 rgba(255,255,255,.08);
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      padding:12px 10px;
      white-space:nowrap;
    }

    td{
      border-bottom: none;
      padding:0;
      font-size:14px;
      vertical-align:middle;
      white-space:nowrap;
      text-align:center;
      font-weight:600;
      background-clip: padding-box;
    }

    tbody tr{
      transition: background .12s ease;
      box-shadow: 0 8px 18px rgba(10,16,12,.06);
      border-radius:12px;
    }

    tbody tr td{background:transparent}

    .cellInner{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px 10px;
      border-radius:12px;
      height:48px;
      width:100%;
      box-sizing:border-box;
      font-weight:700;
      color: var(--row-text);
      border:1px solid rgba(24,79,19,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.45), 0 6px 14px rgba(24,79,19,.04);
      background: linear-gradient(180deg, #f1f6f0, #e8f0e6);
    }

    tbody tr:nth-child(odd) .cellInner{ background: linear-gradient(180deg, #f0f5ef, #e6eee4); }
    tbody tr:nth-child(even) .cellInner{ background: linear-gradient(180deg, #e4ece2, #dae5d8); }
    tbody tr:hover .cellInner{ background: linear-gradient(180deg, #dde8db, #d2e0cf); }

    .cellInner .cell-input{
      width:100%;
      box-sizing:border-box;
      background:#fff;
      border:1px solid rgba(24,79,19,.16);
      padding:6px 10px;
      height: 36px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      margin: 0;
      border-radius:10px;
      text-align:center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 6px 14px rgba(10,16,12,.05);
    }

    .cellInner input.cell-input:focus,
    .cellInner select.cell-input:focus {
      border-color: rgba(24,79,19,.95);
      box-shadow: 0 10px 22px rgba(24,79,19,.14);
      outline: none;
    }

    .actions{
      display:flex;
      gap:6px;
      flex-wrap:nowrap;
      justify-content:center;
      width:100%;
    }

    .tableWrap{ width:100%; overflow:auto; }

    .w110{min-width:110px}
    .w140{min-width:140px}
    .w160{min-width:160px}
    .w200{min-width:200px}
    .w220{min-width:220px}

    .footer{
      position:fixed;
      left:16px;
      bottom:12px;
      font-size:12px;
      color: #0b1a10;
      background: rgba(255,255,255,.98);
      border:1px solid var(--border);
      border-left:7px solid var(--jd-green);
      padding:9px 12px;
      border-radius:14px;
      box-shadow: var(--shadow2);
      backdrop-filter: blur(6px);
    }

    .footer b{color:var(--jd-green)}

    @media (max-width: 900px){
      input, select, button{ width:100%; }
      table{ min-width: 1400px; }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <span class="companyName">INTERAGROVIAL S.A</span>
    <h1 class="title">
      <span class="titleIcon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 7.5C4 6.67 4.67 6 5.5 6h13c.83 0 1.5.67 1.5 1.5v9c0 .83-.67 1.5-1.5 1.5h-13C4.67 18 4 17.33 4 16.5v-9Z" stroke="#FFDE00" stroke-width="1.6" fill="rgba(255,255,255,0.06)"/>
          <path d="M7 9.5h10M7 12h10M7 14.5h6" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="titleText">
        Reservas
        <small>Importaciones</small>
      </span>
    </h1>

    <div class="subpill"><b>En vivo</b> Firestore</div>
  </div>

  <div class="card">
    <div class="accentBar"></div>
    <div class="cardHeader">
      <h3>Filtros</h3>
      <div class="row" style="gap:8px">
        <button id="clearFiltersBtn" class="secondary" type="button">Limpiar filtros</button>
        <button id="exportXlsxBtn" class="secondary" type="button">Descargar XLSX</button>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Buscar (cualquier campo)</label>
        <input id="q" class="w220" placeholder="Ej: caja, material, OC, descripcion" />
      </div>
      <div>
        <label>Cumplido</label>
        <select id="fCumplido" class="w160">
          <option value="">Todos</option>
          <option value="SIN REALIZAR">SIN REALIZAR</option>
          <option value="SI">SI</option>
          <option value="NO">NO</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="accentBar"></div>
    <h3>Agregar fila</h3>

    <div class="row row-add">
      <div><label>Caja</label><input id="caja" class="w140" /></div>
      <div><label>Material</label><input id="material" class="w160" /></div>
      <div><label>Cantidad pack</label><input id="Packing" class="w140" /></div>
      <div><label>Cantid</label><input id="cantidad" class="w110" /></div>
      <div><label>Descripcion</label><input id="descripcion" class="w220" /></div>
      <div><label>Comentario</label><input id="comentario" class="w220" /></div>
      <div><label>O/C</label><input id="oc" class="w140" /></div>
      <div><label>Carpeta</label><input id="carpeta" class="w140" /></div>
      <div><label>Pedido Trasla</label><input id="pedidoTraslado" class="w160" /></div>
      <div><label>Sucurs</label><input id="sucursal" class="w110" /></div>
      <div><label>Fecha (dd/mm/yyyy)</label><input id="fecha" class="w160" /></div>
      <div><label>Hora (hh:mm)</label><input id="horaCarga" class="w110" /></div>
      <div>
        <label>Cumplido</label>
        <select id="cumplido" class="w140">
          <option value="SIN REALIZAR">SIN REALIZAR</option>
          <option value="SI">SI</option>
          <option value="NO">NO</option>
        </select>
      </div>
      <button id="addBtn" class="primary" type="button">Agregar</button>
    </div>

    <div id="msg" class="muted"></div>
    <div id="toast" class="toast"></div>
  </div>

  <div class="tableWrap">
    <table>
      <thead>
        <tr>
          <th>Caja</th>
          <th>Material</th>
          <th>Cantidad pack</th>
          <th>Cantid</th>
          <th>Descripcion</th>
          <th>Comentario</th>
          <th>O/C</th>
          <th>Carpeta</th>
          <th>Pedido Trasla</th>
          <th>Sucurs</th>
          <th>Fecha</th>
          <th>Hora de carga</th>
          <th>Cumplido</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="footer"><b>INTERAGROVIAL S.A</b></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, doc, updateDoc, deleteDoc,
      serverTimestamp, query, orderBy, onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0xgTpM2NjDoyBD5Eo5F2FN-Dxy6UgI9Y",
      authDomain: "reservas-importaciones.firebaseapp.com",
      projectId: "reservas-importaciones",
      storageBucket: "reservas-importaciones.firebasestorage.app",
      messagingSenderId: "404230429294",
      appId: "1:404230429294:web:c11b2d0c15a43ce0f6247f",
      measurementId: "G-S05S1H4XZ0"
    };

    const COLLECTION = "reservas";

    const FIELDS = [
      "caja","material","cantidadPack","cantid","descripcion","comentario",
      "oc","carpeta","pedidoTrasla","sucurs","fecha","horaCarga","cumplido"
    ];

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);
    const tbody = $("tbody");
    const msgEl = $("msg");
    const toastEl = $("toast");

    let cache = [];
    let view = [];
    let editingRowId = null;

    function showToast(text, isError=false){
      toastEl.textContent = text;
      toastEl.classList.toggle("err", isError);
      toastEl.style.display = "block";
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.style.display = "none", 4000);
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function pad2(n){ return String(n).padStart(2,"0"); }

    function nowDateStr(){
      const d = new Date();
      return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`;
    }

    function nowTimeStr(){
      const d = new Date();
      return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    }

    function toCumplido(v){
      const s = String(v || "").trim().toUpperCase();
      if(s === "SI" || s === "SÍ") return "SI";
      if(s === "NO") return "NO";
      return "SIN REALIZAR";
    }

    function matchesText(row, q){
      if(!q) return true;
      const hay = FIELDS.map(k => (row[k] || "").toString().toLowerCase()).join(" |");
      return hay.includes(q);
    }

    function applyFilters(){
      const q = ($("q").value || "").trim().toLowerCase();
      const fc = ($("fCumplido").value || "").trim();

      view = cache.filter(x => {
        const r = x.data;
        if(!matchesText(r, q)) return false;
        if(fc && toCumplido(r.cumplido) !== fc) return false;
        return true;
      });

      draw();
    }

    function clearAddForm(){
      FIELDS.forEach(k => {
        if(!$(k)) return;
        if(k === "cumplido") $(k).value = "SIN REALIZAR";
        else $(k).value = "";
      });
    }

    function renderReadRow(id, r){
      return `
        <tr data-id="${id}">
          <td><div class="cellInner">${escapeHtml(r.caja)}</div></td>
          <td><div class="cellInner">${escapeHtml(r.material)}</div></td>
          <td><div class="cellInner">${escapeHtml(r.cantidadPack)}</div></td>
          <td><div class="cellInner">${escapeHtml(r.cantid)}</div></td>
          <td><div class="cellInner">${escapeHtml(r.descripcion)}</div></td>
          <td><div class="cellInner">${escapeHtml(r.comentario)}</div></td>
          <td><div class="cellInner">${escapeHtml(r.oc)}</div></td>
          <td><div class="cellInner">${escapeHtml(r.carpeta)}</div></td>
          <td><div class="cellInner">${escapeHtml(r.pedidoTrasla)}</div></td>
          <td><div class="cellInner">${escapeHtml(r.sucurs)}</div></td>
          <td><div class="cellInner">${escapeHtml(r.fecha)}</div></td>
          <td><div class="cellInner">${escapeHtml(r.horaCarga)}</div></td>
          <td><div class="cellInner">${escapeHtml(toCumplido(r.cumplido))}</div></td>
          <td>
            <div class="cellInner">
              <div class="actions">
                <button class="small" data-action="edit">Editar</button>
                <button class="small danger" data-action="delete">Eliminar</button>
              </div>
            </div>
          </td>
        </tr>
      `;
    }

    function renderEditRow(id, r){
      const row = {
        caja: r.caja || "",
        material: r.material || "",
        cantidadPack: r.cantidadPack || "",
        cantid: r.cantid || "",
        descripcion: r.descripcion || "",
        comentario: r.comentario || "",
        oc: r.oc || "",
        carpeta: r.carpeta || "",
        pedidoTrasla: r.pedidoTrasla || "",
        sucurs: r.sucurs || "",
        fecha: r.fecha || "",
        horaCarga: r.horaCarga || "",
        cumplido: toCumplido(r.cumplido)
      };

      return `
        <tr data-id="${id}">
          <td><div class="cellInner"><input class="cell-input w140" data-field="caja" value="${escapeHtml(row.caja)}"></div></td>
          <td><div class="cellInner"><input class="cell-input w160" data-field="material" value="${escapeHtml(row.material)}"></div></td>
          <td><div class="cellInner"><input class="cell-input w140" data-field="cantidadPack" value="${escapeHtml(row.cantidadPack)}"></div></td>
          <td><div class="cellInner"><input class="cell-input w110" data-field="cantid" value="${escapeHtml(row.cantid)}"></div></td>
          <td><div class="cellInner"><input class="cell-input w220" data-field="descripcion" value="${escapeHtml(row.descripcion)}"></div></td>
          <td><div class="cellInner"><input class="cell-input w220" data-field="comentario" value="${escapeHtml(row.comentario)}"></div></td>
          <td><div class="cellInner"><input class="cell-input w140" data-field="oc" value="${escapeHtml(row.oc)}"></div></td>
          <td><div class="cellInner"><input class="cell-input w140" data-field="carpeta" value="${escapeHtml(row.carpeta)}"></div></td>
          <td><div class="cellInner"><input class="cell-input w160" data-field="pedidoTrasla" value="${escapeHtml(row.pedidoTrasla)}"></div></td>
          <td><div class="cellInner"><input class="cell-input w110" data-field="sucurs" value="${escapeHtml(row.sucurs)}"></div></td>
          <td><div class="cellInner"><input class="cell-input w160" data-field="fecha" value="${escapeHtml(row.fecha)}"></div></td>
          <td><div class="cellInner"><input class="cell-input w110" data-field="horaCarga" value="${escapeHtml(row.horaCarga)}"></div></td>
          <td>
            <div class="cellInner">
              <select class="cell-input w140" data-field="cumplido">
                <option value="SIN REALIZAR" ${row.cumplido === "SIN REALIZAR" ? "selected" : ""}>SIN REALIZAR</option>
                <option value="SI" ${row.cumplido === "SI" ? "selected" : ""}>SI</option>
                <option value="NO" ${row.cumplido === "NO" ? "selected" : ""}>NO</option>
              </select>
            </div>
          </td>
          <td>
            <div class="cellInner">
              <div class="actions">
                <button class="small primary" data-action="save">Guardar</button>
                <button class="small" data-action="cancel">Cancelar</button>
                <button class="small danger" data-action="delete">Eliminar</button>
              </div>
            </div>
          </td>
        </tr>
      `;
    }

    function draw(){
      if(view.length === 0){
        tbody.innerHTML = `<tr><td colspan="14" style="padding:24px;text-align:center;color:#5f6b67;font-size:14px;font-weight:700;">Sin datos para mostrar.</td></tr>`;
        return;
      }

      tbody.innerHTML = view.map(x => {
        const r = x.data;
        if(editingRowId === x.id) return renderEditRow(x.id, r);
        return renderReadRow(x.id, r);
      }).join("");
    }

    function rowsForExport(){
      return view.map(x => {
        const r = x.data;
        return {
          "Caja": r.caja || "",
          "Material": r.material || "",
          "Cantidad pack": r.cantidadPack || "",
          "Cantid": r.cantid || "",
          "Descripcion": r.descripcion || "",
          "Comentario": r.comentario || "",
          "O/C": r.oc || "",
          "Carpeta": r.carpeta || "",
          "Pedido Trasla": r.pedidoTrasla || "",
          "Sucurs": r.sucurs || "",
          "Fecha": r.fecha || "",
          "Hora de carga": r.horaCarga || "",
          "Cumplido": toCumplido(r.cumplido)
        };
      });
    }

    function exportXlsx(){
      const data = rowsForExport();
      if(!data.length){
        alert("No hay datos para exportar.");
        return;
      }

      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Reservas");

      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth()+1).padStart(2,"0");
      const dd = String(now.getDate()).padStart(2,"0");
      XLSX.writeFile(wb, `reservas_importaciones_${yyyy}-${mm}-${dd}.xlsx`);
    }

    $("q").addEventListener("input", applyFilters);
    $("fCumplido").addEventListener("change", applyFilters);
    $("clearFiltersBtn").addEventListener("click", () => {
      $("q").value = "";
      $("fCumplido").value = "";
      applyFilters();
    });
    $("exportXlsxBtn").addEventListener("click", exportXlsx);

    $("addBtn").addEventListener("click", async () => {
      const row = {
        caja: $("caja").value.trim(),
        material: $("material").value.trim(),
        cantidadPack: $("cantidadPack").value.trim(),
        cantid: $("cantid").value.trim(),
        descripcion: $("descripcion").value.trim(),
        comentario: $("comentario").value.trim(),
        oc: $("oc").value.trim(),
        carpeta: $("carpeta").value.trim(),
        pedidoTrasla: $("pedidoTrasla").value.trim(),
        sucurs: $("sucurs").value.trim(),
        fecha: $("fecha").value.trim() || nowDateStr(),
        horaCarga: $("horaCarga").value.trim() || nowTimeStr(),
        cumplido: toCumplido($("cumplido").value)
      };

      const empty = !row.caja && !row.material && !row.oc && !row.descripcion;
      if(empty){
        alert("Ingresa al menos un dato para agregar.");
        return;
      }

      msgEl.textContent = "Guardando...";
      try{
        await addDoc(collection(db, COLLECTION), {
          ...row,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        clearAddForm();
        showToast("Fila agregada con exito");
      }catch(err){
        console.error(err);
        showToast("No se pudo agregar la fila", true);
      }finally{
        msgEl.textContent = "";
      }
    });

    tbody.addEventListener("click", async (e) => {
      const btn = e.target.closest("[data-action]");
      if(!btn) return;

      const tr = e.target.closest("tr[data-id]");
      if(!tr) return;

      const id = tr.dataset.id;
      const action = btn.dataset.action;

      if(action === "edit"){
        editingRowId = id;
        draw();
        return;
      }

      if(action === "cancel"){
        editingRowId = null;
        draw();
        return;
      }

      if(action === "save"){
        const fields = tr.querySelectorAll("[data-field]");
        const updated = {};

        fields.forEach(el => {
          updated[el.dataset.field] = (el.value || "").toString().trim();
        });
        updated.cumplido = toCumplido(updated.cumplido);

        try{
          btn.disabled = true;
          await updateDoc(doc(db, COLLECTION, id), {
            ...updated,
            updatedAt: serverTimestamp()
          });
          editingRowId = null;
          showToast("Fila actualizada");
        }catch(err){
          console.error(err);
          showToast("No se pudo guardar", true);
        }finally{
          btn.disabled = false;
        }
        return;
      }

      if(action === "delete"){
        if(!confirm("Seguro que quieres eliminar esta fila?")) return;
        try{
          btn.disabled = true;
          await deleteDoc(doc(db, COLLECTION, id));
          if(editingRowId === id) editingRowId = null;
          showToast("Fila eliminada");
        }catch(err){
          console.error(err);
          showToast("No se pudo eliminar", true);
        }finally{
          btn.disabled = false;
        }
      }
    });

    async function startRealtime(){
      try{
        await signInAnonymously(auth);
      }catch(err){
        console.warn("Auth anonima fallo, se intenta igual", err);
      }

      const qSnap = query(collection(db, COLLECTION), orderBy("createdAt", "desc"));
      onSnapshot(qSnap, (snap) => {
        cache = [];
        snap.forEach(d => cache.push({ id: d.id, data: d.data() }));
        applyFilters();
      }, (err) => {
        console.error(err);
        alert("No se pudo leer Firestore. Revisa credenciales o reglas.");
      });
    }

    startRealtime();
  </script>
</body>
</html>
